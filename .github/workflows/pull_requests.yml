name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  jdk17:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: JDK 17 Tests
        run: ./mvnw -B clean install artifact:compare -Dmaven.test.failure.ignore=true -Dansi.strip=true

      - name: Test Logs
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: jdk17-test-results
          path: "**/target/*-reports*/**/TEST-*.xml"

  jdk21:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: JDK 21 Tests
        run: ./mvnw -B clean install artifact:compare -Dmaven.test.failure.ignore=true -Dansi.strip=true

      - name: Test Logs
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: jdk21-test-results
          path: "**/target/*-reports*/**/TEST-*.xml"

  jdk-ea:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '24-ea'
          distribution: 'temurin'
          cache: maven

      - name: JDK EA Tests
        run: |
          set -e
          ./mvnw -B clean install artifact:compare -Dmaven.test.failure.ignore=true -Dansi.strip=true &
          MVN_PID=$!
          # Wait up to 5 hours (20 seconds)
          SECONDS=0
          while kill -0 $MVN_PID 2>/dev/null; do
            if [ $SECONDS -ge 15 ]; then
              echo "Timeout reached. Dumping Java threads..."
              # Find all Java processes and dump threads
              for pid in $(pgrep java); do
                echo "Dumping threads for Java process $pid"
                jstack -l $pid | tee jstack-$pid.txt || echo "jstack failed for $pid"
              done
              # Kill the mvn process
              kill -9 $MVN_PID
              exit 1
            fi
            sleep 5
          done
          wait $MVN_PID

      - name: Test Logs
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: jdk-ea-test-results
          path: |
            **/target/*-reports*/**/TEST-*.xml
            **/jstack-*.txt
